<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: 'Poppins', sans-serif;
  background: #111;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-size: 50px;
}

/* cards */
.card {
  background: #222;
  margin: 15px auto;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  max-width: 90%; /* 🔥 resolve mobile */
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* botão */
a {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  background: #00c6ff;
  border-radius: 20px;
  color: black;
  text-decoration: none;
}

/* 📱 RESPONSIVO */
@media (max-width: 600px) {

  h1 {
    font-size: 30px;
  }

  .card {
    width: 90%;
  }

}
</style>
</head>

<body>

<h1>Nossos Serviços 💼</h1>

<div class="card">
  <h2>Criação de Sites</h2>
  <p>Sites modernos e responsivos para sua empresa.</p>
</div>

<div class="card">
  <h2>Marketing Digital</h2>
  <p>Estratégias para crescer no Instagram e Google.</p>
</div>

<div class="card">
  <h2>Gestão de Tráfego</h2>
  <p>Anúncios pagos para aumentar vendas.</p>
</div>

<a href="index.html">⬅️ Voltar</a>

</body>
</html>
