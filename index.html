<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 20px;
  min-height: 100vh;

  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

h1 {
  font-size: 60px;
  margin-top: 80px;
}

p {
  font-size: 20px;
  max-width: 600px;
  margin: auto;
}

.botao {
  display: inline-block;
  margin: 20px;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 30px;
  background: #00c6ff;
  color: black;
  text-decoration: none;
  transition: 0.3s;
}

.botao:hover {
  transform: scale(1.1);
  background: #00ffcc;
}

@media (max-width: 600px) {
  h1 {
    font-size: 32px;
    margin-top: 40px;
  }

  p {
    font-size: 16px;
    padding: 0 10px;
  }

  .botao {
    display: block;
    width: 80%;
    margin: 15px auto;
  }
}
</style>
</head>

</html>
