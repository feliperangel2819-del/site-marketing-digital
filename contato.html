<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f2027;
  color: white;

}

h1 {
  margin-top: 50px;
}

input, textarea {
  display: block;
  margin: 10px auto;

  border: none;
}

  padding: 12px 25px;
  border-radius: 20px;

  cursor: pointer;
}

button:hover {
  background: #00ffcc;
}

a {
  display: block;
  margin-top: 20px;
  color: cyan;
}
</style>
</head>

<body>

<h1>Fale Conosco 📩</h1>
