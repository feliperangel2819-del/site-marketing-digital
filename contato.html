<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: 'Poppins', sans-serif;
  background: #0f2027;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 40px;
}

/* inputs */
input, textarea {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 250px;
  max-width: 90%; /* 🔥 resolve mobile */
  border-radius: 10px;
  border: none;
}

/* botão */
button {
  padding: 12px 25px;
  border-radius: 20px;
  background: #00c6ff;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #00ffcc;
}

/* link */
a {
  display: block;
  margin-top: 20px;
  color: cyan;
}

/* 📱 RESPONSIVO */
@media (max-width: 600px) {

  h1 {
    font-size: 28px;
  }

  input, textarea {
    width: 90%;
  }

  button {
    width: 90%;
  }

}
</style>
</head>

<body>

<h1>Fale Conosco 📩</h1>

<input type="text" placeholder="Seu nome">
<input type="email" placeholder="Seu email">
<textarea rows="5" placeholder="Sua mensagem"></textarea>

<button onclick="alert('Mensagem enviada!')">Enviar</button>

<a href="index.html">⬅️ Voltar</a>

</body>
</html>
